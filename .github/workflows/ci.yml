name: CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57   # v8.0.0 (immutable)

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests (sample dataset)
        env:
          ECOM_RAW_DIR: data/samples
        run: uv run pytest